instances:

  light:
    model: gotm/light
    parameters:
      g2         : 23.0     # e-folding depth of visible fraction  (m)                     default=23.0
      g1         : 0.35
      A          : 0.58

  daylength:
    model: niva/niva_ecosmo_daylength

  ECO:
    model: niva/niva_ecosmo
    parameters:
      Exphy      : 0.041    # phyto extinction                (m**2/mgCHL),                 default=0.03
      rtsom_cnp  : 1.5547   # ratio of total suspended organic mass (dry) to total CNP mass (-), default = 1.5547 using Anderson (1995) stoichiometry: C106_H175_O42_N16_P.
      rtsim_s    : 2.4596   # ratio of total suspended inorganic mass (dry) to silicon mass (-), default = 2.4596 assuming n=0.5 in opal formula (2(SiO2.nH20)=Si2O5H2, Rios et al., 1998).
      rtsim_c_mesozoo: 0.1583 # ratio of total suspended inorganic mass (dry) to total carbon mass in mesozooplankton, default = 0.1583 using ash:carbon = 7.6/48 from Kiørboe (2013) Table 1.

      rNH4Ps     : 0.20     # NH4 half saturation for Ps      (mmolN/m3),                   default=0.20
      rNO3Ps     : 0.50     # NO3 half saturation for Ps      (mmolN/m3),                   default=0.50
      psiPs      : 3.00     # NH4 inhibition for Ps           (m3/mmolN),                   default=3.00
      rPO4Ps     : 0.05     # PO4 half saturation for Ps      (mmolP/m3),                   default=0.05
      muPs       : 1.51     # max growth rate for Ps          (1/d),                        default=1.10, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_diatom_growth.m. mumax = muP * (alfaP/(alfaP+betaP)) * (betaP/(alfaP+betaP))^(betaP/alfaP) = 1.18 d-1.
      q10Ps      : 2.0      # Q_10 temperature coefficient for Ps  (-),                     default=1.0, Modified PJW 13/04/2026, fixed value, see fit_model_nanoP_growth.m.
      gammaDPs   : 0.25     # day length adaptation coefficient for Ps (-),                 default=1e12, Modified PJW 13/04/2026, fixed value, see fit_model_nanoP_growth.m.
      alfaPs     : 4.62     # initial slope P-I curve for Ps  (mgC/(mgChl day W/m2)),       default=3.127, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_nanoP_growth.m.
      betaPs     : 0.3      # photoinhibition parameter for Ps (mgC/(mgChl day W/m2)),      default=0.0, Modified PJW 13/04/2026, fixed value, see fit_model_nanoP_growth.m.
      MINchl2cPs : 0.0033   # minimum Chl to C ratio Ps       (mgChl/mgC),                  default=0.0063
      MAXchl2cPs : 0.0325   # maximum Chl to C ratio Ps       (mgChl/mgC),                  default=0.0481, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_nanoP_growth.m.
      amortPs    : 10.0     # ratio max:min Ps mortality under nutrient limitation (-),     default=1.0
      m1Ps       : 0.08     # linear Ps mortality rate        (1/d),                        default=0.08
      m2Ps       : 0.0005   # quadratic Ps mortality rate     (m3/(mgC day))                default=0.0, Modified PJW 13/04/2026, fixed value, see notes.
      frmort1Ps  : 0.4      # dissolved fraction of linear mortality (-),                   default=0.4
      frmort2Ps  : 0.3      # dissolved fraction of quadratic mortality (-),                default=0.4

      rNH4Pl     : 0.20     # NH4 half saturation for Pl      (mmolN/m3),                   default=0.20
      rNO3Pl     : 0.50     # NO3 half saturation for Pl      (mmolN/m3),                   default=0.50
      psiPl      : 3.00     # NH4 inhibition for Pl           (m3/mmolN),                   default=3.00
      rPO4Pl     : 0.05     # PO4 half saturation for Pl      (mmolP/m3),                   default=0.05
      rSiPl      : 2.0      # SiO2 half saturation for Pl     (mmolSi/m3),                  default=0.50, Modified PJW 21/05/2026, see notes.
      minSiPl    : 0.0      # stop Si uptake below this concentration (mmolSi/m3),          default=0.0
      muPl       : 1.98     # max growth rate for Pl          (1/d),                        default=1.30, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_diatom_growth.m. mumax = muP * (alfaP/(alfaP+betaP)) * (betaP/(alfaP+betaP))^(betaP/alfaP) = 1.51 d-1.
      q10Pl      : 2.0      # Q_10 temperature coefficient for Pl  (-),                     default=1.0, Modified PJW 13/04/2026, fixed value, see fit_model_diatom_growth.m.
      gammaDPl   : 0.447    # day length adaptation coefficient for Pl (-),                 default=1e12, Modified PJW 13/04/2026, fitted value, see fit_model_diatom_growth.m.
      alfaPl     : 3.93     # initial slope P-I curve for Pl  (mgC/(mgChl day W/m2)),       default=4.225, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_diatom_growth.m.
      betaPl     : 0.290    # photoinhibition parameter for Pl (mgC/(mgChl day W/m2)),      default=0.0, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_diatom_growth.m.
      MINchl2cPl : 0.0033   # minimum Chl to C ratio Pl       (mgChl/mgC),                  default=0.0063
      MAXchl2cPl : 0.0680   # maximum Chl to C ratio Pl       (mgChl/mgC),                  default=0.0370, Modified PJW 13/04/2026, fitted to incubation data, see fit_model_diatom_growth.m.
      amortPl    : 10.0     # ratio max:min Pl mortality under nutrient limitation (-),     default=1.0
      m1Pl       : 0.04     # linear Pl mortality rate        (1/d),                        default=0.04
      m2Pl       : 0.0005   # quadratic Pl mortality rate     (m3/(mgC day))                default=0.0, Modified PJW 13/04/2026, fixed value, see notes.
      frmort1Pl  : 0.4      # dissolved fraction of linear mortality (-),                   default=0.4
      frmort2Pl  : 0.2      # dissolved fraction of quadratic mortality (-),                default=0.4

      GrZsPs     : 1.00     # Grazing rate Zs on Ps           (1/d),                        default=1.00
      GrZsPl     : 1.00     # Grazing rate Zs on Pl           (1/d),                        default=1.00
      GrZsZs     : 0.50     # Grazing rate Zs on Zs           (1/d),                        default=0.00
      GrZsD      : 1.00     # Grazing rate Zs on Det          (1/d),                        default=1.00
      prefZsPs   : 1.00     # Grazing preference Zs on Ps     (-),                          default=0.70, Modified PJW 13/04/2026, rescaled for maximum preference = 1.
      prefZsPl   : 0.35     # Grazing preference Zs on Pl     (-),                          default=0.25, Modified PJW 13/04/2026, rescaled for maximum preference = 1.
      prefZsZs   : 0.20     # Grazing preference Zs on Zs     (-),                          default=0.00
      prefZsD    : 0.12     # Grazing preference Zs on Det.   (-),                          default=0.00, Modified PJW 13/04/2026, rescaled for maximum preference = 1.
      RgZs       : 35.0     # Zs grazing half saturation      (mgC/m3),                     default=40.0, Modified PJW 13/04/2026, rescaled for maximum preference = 1.
      q10Zs      : 2.0      # Q_10 temperature coefficient for Zs (-),                      default=1.0, Modified PJW 13/04/2026, see notes above.
      gammaZsP   : 0.75     # Zs assim. eff. on plankton      (-),                          default=0.75
      gammaZsD   : 0.50     # Zs assim. eff. on det           (-),                          default=0.75, Modified PJW 13/04/2026, see notes above.
      fregesZs   : 0.4      # dissolved fraction of Zs egestion (-),                        default=0.4
      excZs      : 0.02     # Zs basal excretion/resp. rate   (1/d),                        default=0.08, Modified PJW 13/04/2026, see notes above.
      fAexcZs    : 0.5      # Zs fraction of assimilated food that is excreted/respired (-),default=0.0
      fexcdomZs  : 0.5      # Zs fraction of excreted/respired matter that is dom (-),      default=0.0, Modified PJW 13/04/2026, fixed value, see notes above.
      mZs        : 0.05     # Zs mortality rate               (1/d),                        default=0.20, Modified PJW 13/04/2026, fixed value, see notes above.
      q10mZs     : 2.0      # Q_10 temperature coefficient for Zs mortality (-),            default=1.0, Modified PJW 13/04/2026, fixed value, see notes above.
      frmortZs   : 0.4      # dissolved fraction of Zs mortality (-),                       default=0.4

      GrZlPs     : 0.60     # Grazing rate Zl on Ps           (1/d),                        default=0.80, Modified PJW 13/04/2026, fitted value, see fit_model_mesoZ_growth.m and notes above.
      GrZlPl     : 0.60     # Grazing rate Zl on Pl           (1/d),                        default=0.80, Modified PJW 13/04/2026, see notes above.
      GrZlZs     : 0.40     # Grazing rate Zl on Zs           (1/d),                        default=0.50, Modified PJW 13/04/2026, see notes above.
      GrZlZl     : 0.20     # Grazing rate Zl on Zl           (1/d),                        default=0.00, Modified PJW 13/04/2026, see notes above.
      GrZlD      : 0.60     # Grazing rate Zl on Det          (1/d),                        default=0.80, Modified PJW 13/04/2026, see notes above.
      prefZlPs   : 0.50     # Grazing preference Zl on Ps     (-),                          default=0.10, Modified PJW 13/04/2026, see notes above.
      prefZlPl   : 1.00     # Grazing preference Zl on Pl     (-),                          default=0.85, Modified PJW 13/04/2026, see notes above.
      prefZlZs   : 1.00     # Grazing preference Zl on Zs     (-),                          default=0.15, Modified PJW 13/04/2026, see notes above.
      prefZlZl   : 0.25     # Grazing preference Zl on Zl     (-),                          default=0.00, Modified PJW 13/04/2026, see notes above.
      prefZlD    : 0.50     # Grazing preference Zl on Det.   (-),                          default=0.00, Modified PJW 13/04/2026, see notes above.
      RgZl       : 33.0     # Zl grazing half saturation      (mgC/m3),                     default=40.0, Modified PJW 13/04/2026, rescaled for maximum preference = 1.
      q10Zl      : 2.8      # Q_10 temperature coefficient for Zl (-),                      default=1.0, Modified PJW 13/04/2026, fixed value, see fit_model_mesoZ_growth.m.
      fGslpZlPs  : 0.10     # Zl fraction of Ps-grazing that is slopped (not ingested) (-), default=0.0
      fGslpZlPl  : 0.30     # Zl fraction of Pl-grazing that is slopped (not ingested) (-), default=0.0
      fGslpZlZs  : 0.30     # Zl fraction of Zs-grazing that is slopped (not ingested) (-), default=0.0
      fGslpZlZl  : 0.40     # Zl fraction of Zl-grazing that is slopped (not ingested) (-), default=0.0
      fGslpZlD   : 0.20     # Zl fraction of Det-grazing that is slopped (not ingested) (-),default=0.0
      gammaZlP   : 0.70     # Zl assim. eff. on plankton      (-),                          default=0.75, Modified PJW 13/04/2026, fixed value, see fit_model_mesoZ_growth.m and notes above.
      gammaZlD   : 0.50     # Zl assim. eff. on det           (-),                          default=0.75, Modified PJW 13/04/2026, see notes above.
      fregesZl   : 0.2      # dissolved fraction of Zl egestion (-),                        default=0.4
      excZl      : 0.02     # Zl basal excretion/resp. rate   (1/d),                        default=0.08, Modified PJW 13/04/2026, fixed value, see fit_model_mesoZ_growth.m and notes above.
      fAexcZl    : 0.37     # Zl fraction of assimilated food that is excreted/respired (-),default=0.37, Modified PJW 13/04/2026, fitted value, see fit_model_mesoZ_growth.m and notes above.
      fexcdomZl  : 0.5      # Zl fraction of excreted/respired matter that is dom (-),      default=0.0, Modified PJW 13/04/2026, fixed value, see fit_model_mesoZ_growth.m and notes above.
      mZl        : 0.02     # Zl basal mortality rate         (1/d),                        default=0.20, Modified PJW 13/04/2026, fixed value, see fit_model_mesoZ_growth.m and notes above.
      mvZl       : 0.04     # Z1 visual predation mortality   (1/d),                        default=0.0, Modified PJW 13/04/2026, see notes above.
      KE0mvZl    : 2.2      # Half-saturation PAR for Zl visual predation mortality (W/m2)  default=2.2, Modified PJW 13/04/2026, see notes above.
      q10mZl     : 2.0      # Q_10 temperature coefficient for Zl mortality (-),            default=1.0, Modified PJW 13/04/2026, see notes above.
      frmortZl   : 0.2      # dissolved fraction of Zl mortality (-),                       default=0.4, Modified PJW 13/04/2026, see notes above.

      eta_PQ     : 1.1      # photosynthetic quotient: moles O2 produced per mole C fixed (-), default=1.0, Modified PJW 13/04/2026, see notes above.
      eta_O2resp : 1.4      # respiration quotient: moles O2 consumed per mole C respired (-), default=1.0, Modified PJW 13/04/2026, see notes above.
      eta_denit  : 5.3      # denitrification moles NO3 used per mole N in organic matter (-), default=5.3
      eta_SO4resp: 1.0      # SO4 respiration quotient: moles negative O2 produced per mole C respired (-), default=1.0
      eta_nitrif : 2.0      # nitrification quotient: moles O2 consumed per mole NH4 nitrified (-), default=2.0

      nitrifmax  : 0.1      # max nitrification rate          (1/d),                        default=0.1
      aTnitrif   : 0.11     # temp. control nitrification     (1/degC),                     default=0.11
      KO2nitrif  : 0.45     # O2 half saturation for nitrification (mmolO2/m3),             default=0.45
      reminD     : 0.003    # detritus remineralization rate  (1/d),                        default=0.003
      dissO      : 0.019    # opal dissolution rate (0 degC, sil=0) (1/d),                  default=0.015

      Rain0      : 1.0      # maximum Rain Ratio (PIC:POC) within calcifiers (-),           default=1.0
      Kcalom     : 1.0      # half-saturation constant for calcifier Rain Ratio dependence on calcite saturation state (-), default=1.0
      fdissCZs   : 0.5      # fraction of small zooplankton prey calcite that dissolves after ingestion (-), default=0.50
      fdissCZl   : 0.25     # fraction of large zooplankton prey calcite that dissolves after ingestion (-), default=0.25
      dissCmax   : 0.03     # maximum specific dissolution rate (1/d),                      default=0.03
      ndissC     : 2.22     # sed. power of calcite dissolution law (Keir 1980) (-),        default=2.22

      sinkD      : 5.0      # minimum detritus sinking rate   (m/d),                        default=5.00
      sinkOPAL   : 5.0      # minimum opal sinking rate       (m/d),                        default=5.00
      sinkCAL    : 5.0      # minimum calcite sinking rate    (m/d),                        default=5.00
      cz_sinkD   : 0.039    # detritus sinking rate increase per metre below surface (1/d), default=0.0, Modified PJW 21/05/2026
      cz_sinkOPAL: 0.039    # opal sinking rate increase per metre below surface (1/d),     default=0.0, Modified PJW 21/05/2026
      cz_sinkCAL : 0.039    # calcite sinking rate increase per metre below surface (1/d),  default=0.0, Modified PJW 21/05/2026

      crBotStr   : 0.007    # critic. bot. stress for resusp. (N/m2),                       default=0.007
      resuspRt   : 25.00    # resuspension rate               (1/d),                        default=25.00
      burialRt   : 0.0      # linear detritus burial rate     (1/d),                        default=0.00001
      burialRt2  : 1e-7     # quadratic detritus burial parameter (m2/(mg C day),           default=0.0
      reminSED   : 0.002    # sediment remineralization rate  (1/d),                        default=0.002
      aTreminSED : 0.15     # temp. control remineralization  (1/degC),                     default=0.15
      dissSEDO   : 0.0005   # sed. opal dissolution rate      (1/d),                        default=0.0002, Modified PJW 21/05/2026
      burialRtO  : 0.0      # linear opal burial rate         (1/d),                        default=0.00001
      burialRt2O : 1e-7     # quadratic opal burial parameter (m2/(mg C day),               default=0.0
      dissSEDCmax : 30.0    # sed. max. dissolution rate calcite (1/d),                     default=30.0
      dissSEDCmin : 0.05    # sed. min. dissolution rate calcite (1/d),                     default=0.05
      ndissSEDC  : 2.22     # sed. power of calcite dissolution law (Keir 1980) (-),        default=2.22
      burialRtC  : 0.0      # linear calcite burial rate      (1/d),                        default=0.00001
      burialRt2C : 1e-7     # quadratic calcite burial parameter (m2/(mg C day),            default=0.0
      releaseP   : 0.002    # P sed. release rate             (1/d),                        default=0.002
      aTreleaseP : 0.15     # temp. control P sed. release    (1/degC),                     default=0.15
      RelSEDp1   : 0.15     # P sed. release O2-dependence max. fractional reduction (-),   default=0.15
      RelSEDp2   : 0.10     # P sed. release O2-dependence half-saturation coefficient (-), default=0.10

      couple_co2: true
      use_aice: true

    initialization:   # initial nutrient and oxygen conditions are WOA2013 Station-M values (66N 2E)
      no3        : 1200.0   # nitrate (mgC/m**3)
      nh4        : 8.0      # ammonium (mgC/m**3)
      oxy        : 300.0    # oxygen (mmolO2/m**3)
      pho        : 1200.0   # phosphate (mgC/m**3)
      det        : 0.1      # detritus (mgC/m**3)
      dom        : 3.0      # labile dissolved om (mgC/m**3)
      sil        : 1000.0   # silicate (mgC/m**3)
      opa        : 0.1      # opal (mgC/m**3)
      cal        : 0.05     # calcite (mgC/m**3) from ERSEM
      fla        : 0.1      # small phytoplankton (mgC n/m**3)
      dia        : 0.1      # large phytoplankton (mgC/m**3)
      microzoo   : 0.01     # microzooplankton (mgC/m**3)
      mesozoo    : 0.01     # mesozooplankton (mgC/m**3)
      flachl     : 0.005    # small phytoplankton chl-a (mgChl/m**3)
      diachl     : 0.005    # large phytoplankton chl-a (mgChl/m**3)
      sed1       : 113.6    # mgC/m2 (20mgN in C units)
      sed2       : 56.65    # mgC/m2 (20mgSi in C units)
      sed3       : 82.2     # mgC/m2 (2mgP in C units)
      sed4       : 0.05     # mgC/m2 from ERSEM

    coupling:
      E0_s       : light/par  #This uses 'downwelling par' from gotm/light as scalar par
      dic_target : CO2/dic
      alk_target : CO2/alk
      om_cal     : CO2/Om_cal                             # calcite saturation (-)

  CO2:
    long_name: carbonate
    model: niva/niva_ecosmo_carbonate
    parameters:
      pHscale: 1                                          # pH scale (1: total, 0: SWS, -1: SWS backward compatible), default = 1
      use_aice: true                                      # use ice area to limit air-sea flux, default=false
    initialization:
      dic: 2130.0                                         # total dissolved inorganic carbon (mmol C/m^3)
      alk: 2300.0                                         # total alkalinity (mmol/m^3)

  n3_deposition:
    model: external_surface_flux
    coupling:
      target: ECO/no3

  n4_deposition:
    model: external_surface_flux
    coupling:
      target: ECO/nh4