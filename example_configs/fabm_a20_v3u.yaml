# fabm_a20_v3u.yaml
#
# Adaptation of ECOSMO model for northern latitudes (A20 pan-Arctic domain >~50N), version 3u.
#
# Phil Wallhead (PJW), NIVA Bergen, 21/05/2026
#
#
# Change history
# --------------
#
# PJW 26/07/2025: Copied from /fabm/testcases/fabm-nersc-ecosmo.yaml.
#                 Following removal of cyanobacteria code, removed switch use_cyanos and cyano parameters.
#                 Regularized some parameter names (small changes, mostly on capitalization).
#                 Switched off carbonate chemistry (needs updating to use ERSEM/NERSEM code).
#                 Removed switch to turn on additional diagnostics.
#                 Added module niva/niva_ecosmo_carbonate.
#                 -> A20v3q
# PJW 09/04/2026: Reordered to fit the revised niva_ecosmo FABM code.
#                 This should gives similar results to v3q.
#                 -> A20v3qc
# PJW 13/04/2026: Optimized Ps/Pl parameters to incubation datasets for net growth rate and Chl:C
#                 (see fit_model_nanoP_growth.m, fit_model_diatom_growth.m).
#                 For Ps we fitted (muPs,alfaPs,MAXchl2cPs) while for Pl we fitted (muPl,gammaDPl,alfaPl,betaPl,MAXchl2cPs).
#                 Q_10 temperature coefficients were fixed at the standard value 2.0, since fitting these
#                 parameters did not give a significant improvement in AICc (relative to fixing at 2.0).
#                 Ps data were not sufficient to fit (gammaDPs,betaPs) so these were fixed at
#                 standard values of (0.25,0.3).
#                 Pl minimum Si concentration for Si uptake was set to zero (minSiPl = 0) to conform
#                 with other biogeochemical models.
#                 NOTE! The setting minSiPl = 0 mmolSi/m3 is adopted as a new default. This means that
#                       fabm.yaml files will need to specify minSiPl = 1 mmolSi/m3 for legacy simulations.
#                 Ps/Pl coefficients for the increase in mortality due to complete nutrient limitation
#                 (amortPs,amortPl) are set to 10.0 following the hard-coded values in ERSEM (B16).
#                 For (Ps,Pl) mortality rates, we keep the previous/default values (0.08,0.04) d-1 for the linear
#                 rates (as assumed within optimization). For the new quadratic terms (neglected within
#                 incubation setting) we choose conservative default values of 0.0005 m3/mgC/d based on
#                 literature values (Doney et al., 1996; Yool et al., 2013; Feng et al., 2015):
#                 P[mgC/m3]     mort2P[d-1]    mort2P(D96)[d-1]    mort2P(Y13)[d-1]    mort2P(F15)[d-1]
#                 1.0           0.0005         0.0013              0.0025              0.0004
#                 100           0.05           0.13                0.07                0.04
#                 Above, for F15 values we have assumed that small detritus = 5x phytoplankton.
#                 Dissolved fractions for linear phytoplankton mortality (frmort1Ps,frmort1Pl)
#                 are set at 0.4, consistent with previous flat value (frr) for all mortality/egestion
#                 (note that in ERSEM this fraction is dependent on internal nutrient stoichiometry
#                 with lowest values (highest particulate fraction) under nutrient limitation).
#                 Dissolved fractions for quadratic phytoplankton mortality (frmort21Ps,frmort2Pl)
#                 are also set to (0.3,0.2) for now. This assumes that some of the quadratic mortality
#                 is due to viral lysis (e.g. Yool et al., 2013), which should produce mostly DOM,
#                 while some will be due to aggregation-mortality, which should produce POM
#                 (note, in NERSEM the quadratic mortality came exclusively from aggregation-mortality
#                 and produced only POM).
#
#                 Zs parameter values are not presently optimized due to expected high heterogeneity of the
#                 'small zooplankton' assemblage (i.e. dinoflagellates vs. ciliates).
#                 As a first attempt we keep the default values of 1.0 d-1 for maximum grazing rates
#                 (GrZsPs, GrZsPl, GrZsD), but add a lower capacity for group-level cannibalism setting
#                 GrZsZs = 0.5 d-1 (default = 0.0).
#                 Zs prey preferences follow previous nersc values, rescaled to have max. value = 1.0 and setting
#                 small preference values 0.20 for Zs prey (default value 0.0).
#                 Zs grazing half saturation constant RgZs was kept at the previous nersc value, corrected
#                 for the rescaling of preference parameters.
#                 Zs grazing Q10 value q10Zl was set to 2.0 as a standard value.
#                 Zs assimilation efficiency was left at the default value of 0.75 for plankton prey (gammaZsP),
#                 as a plausible compromise between ciliates (highly efficient) and dinoflagellates (less efficient),
#                 while for detritus prey a lower value gammaZsD=0.5 was assumed to account for lower food quality.
#                 Zs dissolved fraction of egesta fregesZl is left at 0.4 = previous flat value (frr).
#                 Zs basal excretion/resp. rate was set to 0.02 d-1, consistent with Zl value (see below).
#                 Zs dom fraction of excreta fexcdomZs was set to 0.5, consistent with Zl value (see below).
#                 Zs mortality rate was set to 0.05 d-1, consistent with basal rates in ERSEM (B16) without
#                 oxygen limitation (see note for Zl below).
#                 Zs Q10 value for mortality q10mZs was set to 2.0 as a standard value, and the dissolved
#                 fraction of Zs mortality frmortZs was set to the previous flat value (frr = 0.4).
#
#                 Zl parameter values (GrZlPl=0.60, fAexcZl=0.37) are optimized to incubation growth/grazing
#                 rate experimental results for biomass-dominant copepod species in northern regions
#                 (see fit_model_mesoZ_growth.m). Maximum grazing rates on other groups are fixed at values
#                 (GrZlPs=0.60, GrZlZs=0.40, GrZlZl=0.20, GrZlD=0.60) assuming a size-based pattern
#                 of relative grazing efficiency, with zooplankton prey (especially Zl) grazed less
#                 efficiently due to higher capacity for evasion and defence. 
#                 Zl prey preferences are revised to simplified estimates based on the literature, which
#                 broadly supports a downweighting of ~0.5 for flagellates/coccolithophores prey vs.
#                 diatom/dinoflagellate/ciliate prey (Castellani et al. 2008; Mayor et al., 2006), and a
#                 lower preference for Zl prey (0.25) in view of a minimum predator:prey ratio of ~5 for Cal. fin.
#                 in Hansen et al. (1994). Detritus preference was set to 0.5 consistent with ERSEM B16.
#                 Zl grazing half saturation constant RgZl was was kept at the previous nersc value, corrected
#                 for the rescaling of preference parameters (RgZl = 33 mgC/m3). This is consistent with
#                 a literature-based estimate of 40 mgC/m3 based on Campbell et al. (2001, Fig. 8) results
#                 for Cal. fin. (nauplii and copepodites) fed on mixed phytoplankton (G. sanguineum + H. triquetra).
#                 Zl grazing Q10 value q10Zl was set to 2.8 following Hansen et al. (1997), as assumed in the
#                 growth/grazing rate optimizations.
#                 Zl grazing slopped fractions are set to values 0.1-0.4, with higher values for larger
#                 prey following results Møller (2007).
#                 Zl assimilation efficiency for plankton prey (gammaZlP) was set to 0.7 following Steinberg and Landry (2017),
#                 while for detritus prey a lower value gammaZlD=0.5 was assumed to account for lower food quality.
#                 Zl dissolved fraction of egesta fregesZl is set to 0.2, since mostly fecal pellet material.
#                 Zl basal excretion/resp. rate was set to 0.02 d-1 following Blackford et al. (2004)
#                 and for consistency with experimental results from Kiørboe et al. (1985) (see note below).
#                 Zl dom fraction of excreta fexcdomZl was set to 0.5, for consistency with K85 (see note below).
#                 Zl basal mortality rate mZl was set to 0.02 d-1 following Yool et al. (2013) with max. extra mortality
#                 rate of mvZl = 0.04 d-1 due to visual predation. These values were set to roughly span
#                 observed ranges (Ohman et al., 2004; Huse et al., 2018) although the latter may be including
#                 significant mortality due to cannibalism. These values imply a max. 3-fold increase with increasing
#                 irradiance, cf. the max. 10-fold increase assumed by Bandara et al. (2018).
#                 NOTE: We do not yet have the effect of low oxygen saturation to increase zooplankton
#                       mortality --- this should be included in a future update.
#                 Zl half-saturation PAR for visual predation mortality was set to 10 umol quanta/m2/s = 2.2 W/m2,
#                 consistent with the fitted value of 10 umol quanta/m2/s from Aksnes et al. (1997).
#                 Zl Q10 value for mortality q10mZl was set to 2.0 as a standard value, and the dissolved
#                 fraction of Zl mortality frmortZl was set to a lower value of 0.2 to account for the
#                 more-particulate nature of egestion and mortality fluxes from higher predators.
#
#                 NOTE: Kiørboe et al. (1985) measured respiration rates for Acartia tonsa feeding on
#                 Rhodomonas balticum. Here the prey ESD (ca. 8 mum) << predator ESD, so it seems reasonable
#                 to neglect DOC production by sloppy feeding (Møller, 2007). They found:
#                   Resp[ngC/mugdw/d] = 0.07*Ingestion[ngC/mugdw/d] + 33     (Fig. 9a)
#                 This suggests that activity respiration is in fact only 7% of ingestion, which is consistent
#                 with the the ECOSMO fraction assuming fexcdomZ = 0.5. If we assume further that
#                 carbon/(dry weight) = 0.45 (see Table 1 in K85), then:
#                   Rest respiration rate = 33*1e-3 [gC/gdw/d] / 0.45 [gC/gdw] = 0.073 d-1 at 18 degC
#                 Assuming q10Zl = 2.8 (Hansen et al., 1997) this gives an estimate for basal respiration rate:
#                   Basal respiration rate = 0.073/(2.8^((18-10)/10)) = 0.03 d-1
#                 However, K85 also observed lower respiration rates after starvation, and therefore excluded
#                 this data point from the linear regression relationship Resp~Ingestion. The excluded data
#                 point was ca. 0.5x the linear model value. Given a simple ECOSMO model with no adaptation
#                 to starvation conditions, it seems reasonable to adopt a slightly lower value for the
#                 basal excretion/respiration rate at 10 degC: excZ = 0.02 d-1. 
#
#                 Review of literature values for photosynthetic/respiration quotients suggested:
#                 PQ (molO2/molC) = 1.0 - 1.25 (Sanz-Martin et al., 2019, for Arctic species)
#                 PQ (molO2/molC) = 1.1 - 1.4 (Laws, 1991, based on chemical equations)
#                 PQ (molO2/molC) = 1.0 - 1.8 (Burris, 1981, measure on 2 species, O2-dependent)
#                 -> chosen value eta_PQ = 1.1.
#                 RQ (molO2/molC) = 1.39 (Stephens et al., 2025, bacteria, measured)
#                 RQ (molO2/molC) = 0.8 - 1.6, ~1.1 @ 50N (Moreno et al., 2022, measured from POM degradation)
#                 RQ (molO2/molC) = 1.4  (Tanioka and Matsumoto, 2020, satellite data, nutrient objective analysis)
#                 -> chosen value eta_O2resp = 1.4.
#                 For eta_denit we use the new default value of 5.3 (=old default, see notes in niva_ecosmo.F90).
# 
#                 Elsewhere we have kept the nersc parameters used in fabm-nersc-ecosmo.yaml (or hard-coded).
#                 -> A20v3r
# PJW 08/05/2026: Added parameters for the new calcification / dissolution processes associated with the
#                 new detrital calcite state variable. Here we follow the parameter values used in (N)ERSEM (B16).
#                 (Rain0=1.0,Kcalom=1.0) based on fit-by-eye to experimental data from Gehlen et al. (2007), Fig. 1.
#                 Zs internal dissolution fraction fdissCZs = 0.5 consistent with observed higher fractions of
#                 within microzooplankton relative to mesozooplankton (Dean et al., 2024).
#                 Zl internal dissolution fraction fdissCZl = 0.25 based on observed max fractions of 0.38 reducing
#                 with time due to increasing buffer effect (White et al, 2018).
#                 Parameter values for pelagic calcite dissolution (dissCmax=0.03 d-1, ndissC=2.22) and sedimentary
#                 calcite dissolution (dissSEDCmax=30.0 d-1, dissSEDCmin=0.05 d-1, ndissSEDC=2.22) follow ERSEM B16.
#                 Burial rate parameters for calcite (burialRtC, burialRt2C) follow the previous nersc values that
#                 were applied uniformly to sedimentary detritus, opal, and calcite.
#                 -> A20v3s
# PJW 21/05/2026  1) Increased silicate half saturation constant for Pl (rSiPl: 0.5 -> 2 mmolSi/m3).
#                 Literature suggests values mostly in ranges 1-3 mmolSi/m3 for Nordic diatoms (Paasche, 1973),
#                 1-5 mmolSi/m3 for Antarctic diatoms (Nelson and Treguer, 1992), and 1-3 mmolSi/m3 for diatoms
#                 in the Svalbard region (Krause et al., 2018). Note that although Paasche (1973) does support
#                 a threshold parameter minSiPl in range 0-1 mmolSi/m3, these are based on experiments with single
#                 species and it seems likely that the community-level threshold effect would be small (since species
#                 with lower minSiPl will dominate at low Si concentrations). Note that Y13 uses a half saturation
#                 value of 3 mmolSi/m3, while A15 models a range 1-8 mmolSi/m3 dependent on diatom biomass and
#                 annual-average Si concentration. The A20v3s simulation also suggested too-low surface silicate
#                 in Nordic and North Sea regions, suggesting excessive drawndown by Pl, notably at the Irminger Sea
#                 station where the A20 physical model is performing best.
#                 2) Added linear depth dependences (cz_sinkD,cz_sinkOPAL,cz_sinkCAL) for the particulate sinking rates,
#                 setting a uniform value of 0.039 d-1 to achieve a speed increase of 195 m/d between surface and
#                 5000 m depth (approximately following A15 and Middelburg, 2019).
#                 3) Added Ridgwell et al. (2002) model for water colum opal dissolution rate as a function of
#                 temperature and degree of undersaturation, following PISCES model (A15) and NERSEM model.
#                 The parameter dissO now defines the rate at 0 degC and full undersaturation (sil=0), and we set its
#                 value to 0.019 d-1 following Ridgwell et al. (2002).
#                 4) Increased sediment opal dissolution rate dissSEDO: 0.0002 -> 0.0005 d-1.
#                 Literature suggests a range 0.0002-0.002 d-1 for sediment core tops, with lower values mostly
#                 driven by elevated Al/Si ratio associated with lithogenic (mineral) sediment deposition, which
#                 should be largest in coastal/shelf regions (Van Cappellen et al., 2002; Ridgwell et al., 2002;
#                 Sarmiento and Gruber, 2006). A further downward correction should be made for the overall sediment
#                 rate due to a decrease with depth in sediments, but this should be at most a 50% reduction according
#                 to Eqn. 10 in Ridgwell et al. (2002). Note the dissolution rate also increases with bottom temperature
#                 and degree of Si undersaturation, but since these both increase towards coast/shelf regions, their
#                 effects are likely counterracted by an increase in Al/Si ratio --- therefore we keep the simple
#                 flat rate constant for now in lieu of a sediment module to account for Al/Si variations.
#                 -> A20v3u
#
#
